<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#1a2332"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="3" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.6"/>
    </filter>
    <filter id="tglow" x="-5%" y="-20%" width="110%" height="140%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g stroke="#3a7bd5" stroke-width="0.6" opacity="0.07">
    <line x1="0" y1="90"  x2="1200" y2="90"/>  <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="270" x2="1200" y2="270"/> <line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="450" x2="1200" y2="450"/> <line x1="0" y1="540" x2="1200" y2="540"/>
    <line x1="90"  y1="0" x2="90"  y2="630"/>  <line x1="180" y1="0" x2="180" y2="630"/>
    <line x1="270" y1="0" x2="270" y2="630"/>  <line x1="360" y1="0" x2="360" y2="630"/>
    <line x1="450" y1="0" x2="450" y2="630"/>  <line x1="540" y1="0" x2="540" y2="630"/>
  </g>

  <!-- Tile progression (left) -->
  <rect x="30"  y="40"  width="90" height="90" rx="8" fill="#eee4da" filter="url(#shadow)"/>
  <text x="75"  y="96"  text-anchor="middle" font-size="36" font-weight="900" fill="#776e65" font-family="system-ui">2</text>
  <rect x="130" y="40"  width="90" height="90" rx="8" fill="#ede0c8" filter="url(#shadow)"/>
  <text x="175" y="96"  text-anchor="middle" font-size="36" font-weight="900" fill="#776e65" font-family="system-ui">4</text>
  <rect x="30"  y="140" width="90" height="90" rx="8" fill="#f2b179" filter="url(#shadow)"/>
  <text x="75"  y="196" text-anchor="middle" font-size="36" font-weight="900" fill="#fff" font-family="system-ui">8</text>
  <rect x="130" y="140" width="90" height="90" rx="8" fill="#f59563" filter="url(#shadow)"/>
  <text x="175" y="196" text-anchor="middle" font-size="32" font-weight="900" fill="#fff" font-family="system-ui">16</text>
  <rect x="30"  y="240" width="90" height="90" rx="8" fill="#f65e3b" filter="url(#shadow)"/>
  <text x="75"  y="296" text-anchor="middle" font-size="32" font-weight="900" fill="#fff" font-family="system-ui">64</text>
  <rect x="130" y="240" width="90" height="90" rx="8" fill="#edcf72" filter="url(#shadow)"/>
  <text x="175" y="296" text-anchor="middle" font-size="26" font-weight="900" fill="#fff" font-family="system-ui">128</text>
  <rect x="30"  y="340" width="90" height="90" rx="8" fill="#edcc61" filter="url(#shadow)"/>
  <text x="75"  y="396" text-anchor="middle" font-size="26" font-weight="900" fill="#fff" font-family="system-ui">256</text>
  <rect x="130" y="340" width="90" height="90" rx="8" fill="#edc850" filter="url(#shadow)"/>
  <text x="175" y="396" text-anchor="middle" font-size="26" font-weight="900" fill="#fff" font-family="system-ui">512</text>

  <!-- Hero 2048 tile -->
  <rect x="240" y="40" width="190" height="390" rx="14" fill="#edc22e" filter="url(#shadow)"/>
  <text x="335" y="268" text-anchor="middle" font-size="72" font-weight="900" fill="#fff"
        font-family="system-ui" filter="url(#tglow)">2048</text>

  <!-- Title -->
  <text x="480" y="260"
        font-family="system-ui,-apple-system,Arial Black,sans-serif"
        font-size="200" font-weight="900" fill="white" letter-spacing="-6"
        filter="url(#tglow)">2048</text>

  <!-- Tagline -->
  <text x="484" y="340"
        font-family="system-ui,-apple-system,sans-serif"
        font-size="40" fill="#6a8fa8" letter-spacing="8" font-weight="500">MERGE · THINK · WIN</text>

  <!-- Separator -->
  <line x1="480" y1="390" x2="1170" y2="390" stroke="#2a3a4a" stroke-width="2"/>

  <!-- Badges -->
  <rect x="480" y="410" width="140" height="52" rx="8" fill="#1a4a2e"/>
  <text x="550" y="443" text-anchor="middle" font-family="system-ui" font-size="26" fill="#4caf80" font-weight="600">🧒 Kids</text>
  <rect x="632" y="410" width="150" height="52" rx="8" fill="#0d2a4a"/>
  <text x="707" y="443" text-anchor="middle" font-family="system-ui" font-size="26" fill="#5a9fd4" font-weight="600">🧠 Adult</text>

  <!-- BodhiProtocol wordmark -->
  <text font-family="system-ui,-apple-system,sans-serif" font-size="30" font-weight="700" y="448">
    <tspan x="960" fill="#ffffff">Bodhi</tspan><tspan fill="#38BDF8"> Protocol</tspan>
  </text>
</svg>
